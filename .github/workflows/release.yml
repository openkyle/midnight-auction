name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate module version matches tag
        run: |
          MODULE_VERSION="$(node -p "require('./module.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MODULE_VERSION" != "$TAG_VERSION" ]; then
            echo "module.json version ($MODULE_VERSION) must match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build Foundry module zip
        run: |
          mkdir -p dist/midnight-auction
          cp README.md module.json dist/midnight-auction/
          cp -R scripts styles templates dist/midnight-auction/
          cd dist
          zip -r midnight-auction.zip midnight-auction
          cp ../module.json module.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/midnight-auction.zip \
            dist/module.json \
            --title "Midnight Auction $GITHUB_REF_NAME" \
            --notes "Foundry VTT release for Midnight Auction $GITHUB_REF_NAME."
